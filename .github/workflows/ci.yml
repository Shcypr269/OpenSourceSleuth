# GitHub Actions CI Pipeline for SourceSleuth
# Runs tests and linting on all pushes and pull requests

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual workflow runs
  workflow_dispatch:

env:
  PIP_DISABLE_PIP_VERSION_CHECK: 1
  PIP_NO_WARN_SCRIPT_LOCATION: 1

jobs:
  # ---------------------------------------------------------------------------
  # Lint Job - Run Ruff linter and formatter
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff Linter
        run: |
          ruff check src/ tests/

      - name: Run Ruff Formatter (check mode)
        run: |
          ruff format src/ tests/ --check

  # ---------------------------------------------------------------------------
  # Test Job - Run pytest across all supported Python versions
  # ---------------------------------------------------------------------------
  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install System Dependencies (OCR)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr poppler-utils

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ui,ocr]"
          python -m nltk.downloader wordnet averaged_perceptron_tagger punkt punkt_tab omw-1.4

      - name: Show Installed Packages
        run: |
          pip list

      - name: Run Pytest with Coverage
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

      - name: Upload Coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Build Job - Verify package builds correctly
  # ---------------------------------------------------------------------------
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build Source and Wheel Distribution
        run: |
          python -m build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Security Scan - Check for common security issues
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Safety and Bandit
        run: |
          pip install safety bandit

      - name: Run Bandit Security Linter
        run: |
          bandit -r src/ -ll
        continue-on-error: true

      - name: Check Dependencies for Vulnerabilities
        run: |
          pip install -e ".[dev,ui,ocr]"
          safety check --full-report
        continue-on-error: true
